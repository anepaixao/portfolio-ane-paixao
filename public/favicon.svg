<svg viewBox="0 0 512 512" width="512" height="512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0e3d" />
      <stop offset="100%" stop-color="#10072b" />
    </linearGradient>

    <linearGradient id="letterGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" />
      <stop offset="40%" stop-color="#6D3BFF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bg)" />

  <rect
    x="2"
    y="2"
    width="508"
    height="508"
    rx="109"
    ry="109"
    fill="none"
    stroke="#6D3BFF"
    stroke-width="2"
    stroke-opacity="0.35"
  />

  <g filter="url(#glow)">
    <line
      x1="256"
      y1="108"
      x2="128"
      y2="404"
      stroke="url(#letterGrad)"
      stroke-width="80"
      stroke-linecap="round"
    />
    <line
      x1="256"
      y1="108"
      x2="384"
      y2="404"
      stroke="url(#letterGrad)"
      stroke-width="80"
      stroke-linecap="round"
    />
    <line
      x1="182"
      y1="288"
      x2="330"
      y2="288"
      stroke="url(#letterGrad)"
      stroke-width="68"
      stroke-linecap="round"
    />
  </g>
</svg>